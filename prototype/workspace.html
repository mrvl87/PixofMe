<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace - Pixforme</title>
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/wizard.css?v=workspace-flow2">
</head>
<body class="wizard-shell">
<div class="wizard-topbar" id="wizardChrome"></div>
<main class="wizard-page container workspace-page-only">
  <div class="wizard-title-row">
    <div>
      <div class="wizard-kicker">WORKSPACE</div>
      <h1 class="wizard-title">PROJECT ANDA</h1>
      <p class="wizard-subtitle">Pilih project yang sudah ada, atau buat project baru untuk mulai dokumentasi gratis pada free tier.</p>
    </div>
    <div class="state-chip-row" id="workspaceSummary"></div>
  </div>

  <section class="workspace-card-grid" id="projectGrid"></section>
</main>

<div class="modal-overlay" id="createProjectModal">
  <div class="modal-box create-project-box">
    <div class="modal-head">
      <div>
        <div class="modal-title">Create Project</div>
        <div class="modal-sub">Isi nama project. Detail instansi, pekerjaan, lokasi, dan item RAB diatur pada wizard step 1.</div>
      </div>
      <button class="modal-close" data-close="createProjectModal" type="button"><span data-pixel-icon="x" data-pixel-size="16" data-pixel-color="#6B6B68"></span></button>
    </div>
    <label class="field-label">Nama Project</label>
    <input class="field-input" id="newProjectName" placeholder="Contoh: Pembangunan Gedung Kantor Dinas A" autocomplete="off">
    <div class="dialog-actions">
      <button class="pixel-btn pixel-btn-ghost" data-close="createProjectModal" type="button">Batal</button>
      <button class="pixel-btn pixel-btn-accent" id="confirmCreateProject" type="button">Create & Masuk Wizard</button>
    </div>
  </div>
</div>

<script src="assets/js/pixel-icons.js"></script>
<script src="assets/js/wizard-state.js?v=workspace-flow2"></script>
<script>
  var state = PixWizard.loadState();
  PixWizard.renderWizardChrome(0, '<a class="pixel-btn pixel-btn-ghost" href="index.html">Home</a><button class="pixel-btn pixel-btn-accent" id="openCreateProject" type="button">Create Project</button>');

  function esc(value) { return PixWizard.escapeHtml(value); }

  function ensureWorkspace() {
    state.workspace = state.workspace || { name: 'Workspace Utama', activeProjectId: '', projects: [] };
    state.workspace.projects = Array.isArray(state.workspace.projects) ? state.workspace.projects : [];
    if (!state.workspace.projects.length) {
      state.workspace.projects = [
        { id: 'project_1', name: 'Pembangunan Gedung Kantor Dinas A', instansi: 'Dinas Pekerjaan Umum Kota X', location: 'Jl. Sudirman No. 10', status: 'Aktif' },
        { id: 'project_2', name: 'Project Berikutnya', instansi: 'Belum diatur', location: '-', status: 'Draft' }
      ];
      state.workspace.activeProjectId = 'project_1';
      PixWizard.saveState(state);
    }
  }

  function projectMeta(project) {
    var instansi = project.instansi || project.client || 'Belum diatur';
    var location = project.location || project.lokasi || '-';
    var status = project.status || 'Draft';
    return { instansi: instansi, location: location, status: status };
  }

  function renderWorkspace() {
    ensureWorkspace();
    var total = state.workspace.projects.length;
    document.getElementById('workspaceSummary').innerHTML = '<span class="state-chip">Free Tier</span><span class="state-chip">Project: ' + total + '</span>';
    document.getElementById('projectGrid').innerHTML = state.workspace.projects.map(function (project) {
      var meta = projectMeta(project);
      var active = project.id === state.workspace.activeProjectId;
      return '<button class="workspace-project-card ' + (active ? 'active' : '') + '" data-open-project="' + project.id + '" type="button">' +
        '<span class="project-card-top"><span class="mono project-card-id">' + esc(project.id) + '</span><span class="project-card-status">' + esc(meta.status) + '</span></span>' +
        '<span class="project-card-title">' + esc(project.name || project.id) + '</span>' +
        '<span class="project-card-meta">' + esc(meta.instansi) + '</span>' +
        '<span class="project-card-meta">' + esc(meta.location) + '</span>' +
        '<span class="project-card-cta">Buka Wizard</span>' +
      '</button>';
    }).join('') +
    '<button class="workspace-project-card create-card" id="createCard" type="button">' +
      '<span class="create-card-plus">+</span>' +
      '<span class="project-card-title">Create Project</span>' +
      '<span class="project-card-meta">Mulai dokumentasi gratis</span>' +
    '</button>';

    document.querySelectorAll('[data-open-project]').forEach(function (btn) {
      btn.addEventListener('click', function () { openProject(btn.getAttribute('data-open-project')); });
    });
    document.getElementById('createCard').addEventListener('click', openCreateModal);
    if (typeof renderPixelIcons === 'function') renderPixelIcons();
  }

  function openProject(id) {
    ensureWorkspace();
    var project = state.workspace.projects.find(function (row) { return row.id === id; });
    if (!project) return;
    state.workspace.activeProjectId = id;
    state.workspace.projects.forEach(function (row) { row.status = row.id === id ? 'Aktif' : (row.status === 'Aktif' ? 'Draft' : row.status); });
    state.project.name = project.name || '';
    state.project.pekerjaan = state.project.name;
    state.project.client = project.instansi || project.client || '';
    state.project.instansi = state.project.client;
    state.project.location = project.location || project.lokasi || '';
    state.project.lokasi = state.project.location;
    state.project.items = Array.isArray(project.items) ? project.items.slice() : state.project.items;
    state.project.rabText = project.rabText || (Array.isArray(state.project.items) ? state.project.items.join('\n') : '');
    PixWizard.saveState(state);
    window.location.href = 'wizard-step1.html';
  }

  function openCreateModal() {
    document.getElementById('newProjectName').value = '';
    document.getElementById('createProjectModal').classList.add('show');
    setTimeout(function () { document.getElementById('newProjectName').focus(); }, 40);
  }

  function createProject() {
    ensureWorkspace();
    var name = document.getElementById('newProjectName').value.trim();
    if (!name) {
      document.getElementById('newProjectName').focus();
      return;
    }
    var id = 'project_' + Date.now().toString(36);
    var project = { id: id, name: name, instansi: 'Belum diatur', location: '-', status: 'Aktif', items: [], rabText: '' };
    state.workspace.projects.forEach(function (row) { if (row.status === 'Aktif') row.status = 'Draft'; });
    state.workspace.projects.unshift(project);
    state.workspace.activeProjectId = id;
    state.project.name = name;
    state.project.pekerjaan = name;
    state.project.client = '';
    state.project.instansi = '';
    state.project.location = '';
    state.project.lokasi = '';
    state.project.items = [];
    state.project.rabText = '';
    PixWizard.saveState(state);
    window.location.href = 'wizard-step1.html';
  }

  document.getElementById('openCreateProject').addEventListener('click', openCreateModal);
  document.getElementById('confirmCreateProject').addEventListener('click', createProject);
  document.getElementById('newProjectName').addEventListener('keydown', function (event) { if (event.key === 'Enter') createProject(); });
  document.querySelectorAll('[data-close]').forEach(function (btn) {
    btn.addEventListener('click', function () { document.getElementById(btn.getAttribute('data-close')).classList.remove('show'); });
  });
  document.querySelectorAll('.modal-overlay').forEach(function (overlay) {
    overlay.addEventListener('click', function (event) { if (event.target === overlay) overlay.classList.remove('show'); });
  });

  renderWorkspace();
</script>
</body>
</html>
